name: Contextive Publish
# temp to avoid accidental publishing while testing ci script refactor
on: workflow_dispatch
# on:
#   release:
#     types: [published]
  
env:
  dotnet-version: '7.0.x'
jobs:
  get-matrix:
    name: "Load Release Matrix"
    outputs:
      matrix: ${{ steps.load-matrix.outputs.matrix }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          persist-credentials: false
      - id: load-matrix
        name: Load Build Matrix
        run: |
          matrix="matrix=$(yq -P -o=json .github/release-matrix.yml | jq -c .)"
          echo $matrix
          echo $matrix >> $GITHUB_OUTPUT

  language-server:
    name: Language Server
    needs: get-matrix
    strategy:
      matrix: ${{ fromJSON(needs.get-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: false

      - uses: ./.github/actions/init-dotnet

      - name: Build
        id: build
        run: dotnet fsi language-server/build.fsx -- -r ${{ matrix.dotnet_runtime }}
        working-directory: src

      - run: echo ${{ steps.build.outputs.artifact-path }}

      - name: Upload Language Server to Release
        uses: svenstaro/upload-release-action@v2
        if: ${{ github.event == 'release' }}
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.build.outputs.artifact-path }}
          tag: ${{ github.ref }} 


